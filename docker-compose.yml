# Local development services. Start with: docker compose up -d
# Matches apps/api/.env defaults (DATABASE_URL / REDIS_URL).
#
# Note: the API currently uses Postgres only — Redis is provided here for
# convenience / future use (it backed the rate limiter that was since removed).
services:
  postgres:
    image: postgres:17-alpine
    container_name: elysia-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: elysia-dev-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
