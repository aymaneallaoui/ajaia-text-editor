services:
  - type: web
    name: quire
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    # DB migrations run on container start (see the Dockerfile CMD), so this works
    # on the free plan — preDeployCommand requires a paid instance type.
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the API reads it via env.PORT.
      - key: DATABASE_URL
        fromDatabase:
          name: quire-db
          property: connectionString
      # Public URL for links inside emails — set to your service's Render URL.
      - key: APP_URL
        sync: false
      # Resend (transactional email) — optional; set to enable notifications.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Cloudflare R2 (attachments) — optional; set to enable uploads.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

databases:
  - name: quire-db
    databaseName: quire
    user: quire
    plan: free
    region: oregon
    postgresMajorVersion: '16'
    ipAllowList: [] # internal-only (reachable from the service, not the public internet)
